# Oilfield Greedy Solver – configuration file
# Load with:  solve -c solver_config.yaml -p <param> -b <bat> -D <dist>
# Any value here can be overridden at the command line with --set key=value
# or with the short/long flags -k / -t.

# ---------------------------------------------------------------------------
# Input files
# Paths can be absolute or relative to the working directory.
# ---------------------------------------------------------------------------
input:
  param_file:   ""   # -p / --param    Path to parameters_*.dat
  battery_file: ""   # -b / --battery  Path to batteries_*.dat
  dist_file:    ""   # -D / --dist     Path to distance_*.dat

# ---------------------------------------------------------------------------
# Greedy cyclic-window heuristic
# ---------------------------------------------------------------------------
solver:
  max_wells: 100    # K – maximum wells to visit per battery.
                    # The algorithm slides a window of this size through the
                    # priority-sorted well list looking for a feasible subset.
                    # Increase if no solution is found at smaller values.
                    # Typical range: 10–30.

  tolerance: 0.1    # Allowed fractional deviation from battery target Gpt.
                    # 0.05 = ±5 %.  Widen if instances have noisy targets
                    # (batteries.noise_std > 0.05 in the generator config).

  crews: 2          # Number of intervention crews.
                    # Used to compute the route (single combined route for
                    # now; multi-crew partitioning is a planned extension).
                    # Typically 1–5.

  max_quantity: 100 # Maximum number of wells that may be selected globally.
                    # (default: unconstrained — leave empty to use the C++ default INT_MAX)

  max_cost: 5000    # Maximum total intervention cost  sum C[i] over selected wells.
                    # (default: unconstrained — leave empty to use the C++ default DBL_MAX)

  max_loss: 5000    # Maximum allowed net-loss  sum (G[i]-N[i])*newregime[i]/100.
                    # During selection the actual new regime is used for the estimate.
                    # (default: unconstrained — leave empty to use the C++ default DBL_MAX)

  sort_method: priority_cost
                    # Criterion used to sort wells within each battery before
                    # adjusting regimes to meet the production target.
                    # priority_cost – ascending priority/cost ratio  (default)
                    # loss          – ascending gross-minus-net production loss
                    # route         – nearest-neighbour TSP visit order

  hs_hms: 30        # Harmony Memory Size.
  hs_iterations: 1000
                    # Number of improvisation iterations.
  hs_hmcr: 0.92     # Harmony Memory Consideration Rate (0..1).
  hs_par: 0.35      # Pitch Adjustment Rate (0..1).
  hs_bw: 5.0        # Pitch bandwidth in regime points.
  hs_change_prob: 0.25
                    # For random initialization/generation, probability that
                    # a well departs from its current regime.
  hs_seed_with_greedy: true
                    # Seed one harmony with the greedy solution.

  # Weighted single-objective scalarization used by method=hs:
  hs_weight_cost: 1.0
  hs_weight_loss: 1.0
  hs_weight_distance: 1.0
  hs_weight_quantity: 0.2

  hs_penalty: 1000.0
                    # Penalty multiplier for target/constraint violations.

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  file: ""          # -o  Write solution to this file (plain text).
                    # Leave empty to use the default "solution.txt".
  debug: false      # --dbg  Print verbose solver diagnostics.
